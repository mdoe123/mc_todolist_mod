<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="app.title.block">清单编辑器 - 块模式 · Chat Todolist</title>
<style>
  /* ---------- 主题变量（与 editor.html 保持一致） ---------- */
  :root {
    --bg: #ffffff;
    --fg: #111111;
    --muted: #666666;
    --border: #cccccc;
    --card-bg: #fafafa;
    --hover: #eeeeee;
    --btn-bg: #f5f5f5;
    --btn-border: #bbbbbb;
    --danger: #b00020;
    --shadow: rgba(0,0,0,0.04);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #1a1a1a;
      --fg: #e0e0e0;
      --muted: #999999;
      --border: #444444;
      --card-bg: #222222;
      --hover: #333333;
      --btn-bg: #2a2a2a;
      --btn-border: #555555;
      --danger: #ff6b6b;
      --shadow: rgba(0,0,0,0.3);
    }
  }
  html[data-theme="dark"] {
    --bg: #1a1a1a;
    --fg: #e0e0e0;
    --muted: #999999;
    --border: #444444;
    --card-bg: #222222;
    --hover: #333333;
    --btn-bg: #2a2a2a;
    --btn-border: #555555;
    --danger: #ff6b6b;
    --shadow: rgba(0,0,0,0.3);
  }
  html[data-theme="light"] {
    --bg: #ffffff;
    --fg: #111111;
    --muted: #666666;
    --border: #cccccc;
    --card-bg: #fafafa;
    --hover: #eeeeee;
    --btn-bg: #f5f5f5;
    --btn-border: #bbbbbb;
    --danger: #b00020;
    --shadow: rgba(0,0,0,0.04);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ---------- 工具栏 ---------- */
  #toolbar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-wrap: wrap;
  }
  #toolbar .group { display: flex; align-items: center; gap: 6px; }
  #toolbar .sep {
    width: 1px;
    height: 22px;
    background: var(--border);
    flex: 0 0 auto;
  }
  #toolbar .spacer { flex: 1 1 auto; }
  #toolbar .status {
    font-size: 12px;
    color: var(--muted);
    max-width: 40%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #toolbar .status.err { color: var(--danger); }
  #toolbar .title {
    font-weight: 600;
    font-size: 14px;
    white-space: nowrap;
  }

  /* ---------- 模式切换按钮组 ---------- */
  .mode-switch {
    display: inline-flex;
    border: 1px solid var(--btn-border);
    border-radius: 4px;
    overflow: hidden;
  }
  .mode-switch button {
    border: none;
    border-radius: 0;
    padding: 4px 12px;
    background: var(--btn-bg);
  }
  .mode-switch button.active {
    background: var(--fg);
    color: var(--bg);
  }

  /* ---------- 通用控件 ---------- */
  button, select, input {
    font-family: inherit;
    font-size: 13px;
    color: var(--fg);
  }
  button {
    background: var(--btn-bg);
    border: 1px solid var(--btn-border);
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
    white-space: nowrap;
  }
  button:hover { background: var(--hover); }
  button:active { transform: translateY(1px); }
  button.danger { color: var(--danger); border-color: var(--danger); }
  button.danger:hover { background: var(--danger); color: #fff; }

  input[type="text"], input[type="number"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 6px;
    outline: none;
  }
  input[type="text"]:focus, input[type="number"]:focus {
    border-color: var(--fg);
  }
  input[readonly] { background: var(--card-bg); color: var(--muted); }
  textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 6px;
    outline: none;
    font-family: inherit;
    font-size: 13px;
    color: var(--fg);
    resize: vertical;
  }
  textarea:focus { border-color: var(--fg); }

  label.field { display: inline-flex; align-items: center; gap: 6px; }
  label.field > span { color: var(--muted); white-space: nowrap; }
  .compact { width: 80px; }

  /* ---------- 主区域 ---------- */
  #main {
    flex: 1 1 auto;
    display: flex;
    min-height: 0;
  }

  /* ---------- 左侧文件列表侧栏 ---------- */
  #sidebar {
    flex: 0 0 220px;
    border-right: 1px solid var(--border);
    background: var(--card-bg);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  #sidebar .sidebar-head {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex: 0 0 auto;
  }
  #fileList {
    flex: 1 1 auto;
    overflow: auto;
    padding: 6px;
  }
  .file-item {
    display: flex;
    flex-direction: column;
    padding: 6px 8px;
    border-radius: 4px;
    cursor: pointer;
    margin-bottom: 4px;
    border: 1px solid transparent;
  }
  .file-item:hover { background: var(--hover); }
  .file-item.active {
    background: var(--bg);
    border-color: var(--btn-border);
  }
  .file-item .file-name {
    font-weight: 600;
    word-break: break-all;
  }
  .file-item .file-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .empty-hint { font-size: 12px; color: var(--muted); padding: 8px; }

  /* ---------- Blockly 工作区容器 ---------- */
  #blockly-container {
    flex: 1 1 auto;
    position: relative;
    min-width: 0;
  }
  #blockly-container .blocklyToolboxDiv {
    background: var(--card-bg);
    color: var(--fg);
    border-right: 1px solid var(--border);
  }
  /* 工作区占位提示 */
  #workspace-hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: var(--muted);
    font-size: 13px;
    pointer-events: none;
    text-align: center;
  }
  #workspace-hint.hidden { display: none; }
</style>
</head>
<body>
  <div id="toolbar">
    <span class="title" data-i18n="app.title.block">清单编辑器 - 块模式</span>

    <div class="group">

<!-- Blockly 工具箱（XML 定义） -->
<xml id="toolbox" style="display:none">
  <category name="步骤" data-i18n-cat="cat.steps" expanded="true">
    <block type="interactive_task"></block>
    <block type="terminal_task"></block>
  </category>
  <sep gap="20"></sep>
  <category name="动作" data-i18n-cat="cat.actions" expanded="true">
    <block type="jumpto"></block>
    <block type="print"></block>
    <block type="run"></block>
    <block type="end"></block>
    <block type="set_var">
      <value name="value">
        <shadow type="expr_text"><field name="TEXT">0</field></shadow>
      </value>
    </block>
    <block type="if">
      <value name="cond">
        <shadow type="expr_text"><field name="TEXT">${counter} &lt; 3</field></shadow>
      </value>
    </block>
  </category>
  <sep gap="20"></sep>
  <category name="表达式" data-i18n-cat="cat.expr" expanded="true">
    <block type="game_var"></block>
    <block type="variables_get"></block>
    <block type="variables_set"></block>
    <block type="math_number"></block>
    <block type="math_arithmetic"></block>
    <block type="logic_compare"></block>
    <block type="logic_operation"></block>
    <block type="logic_negate"></block>
    <block type="logic_boolean"></block>
  </category>
</xml>

<!-- Blockly 库（由本地 HTTP 服务器提供） -->
<script src="/assets/blockly/blockly.min.js"></script>
<script>
"use strict";
/* ============================================================
 * 清单编辑器 - 块模式（Blockly）
 * ------------------------------------------------------------
 * 纯原生 HTML/CSS/JS + 本地 Blockly 库。通过 fetch 调用本地
 * HTTP 服务器（仅绑定 127.0.0.1）读写游戏目录 todolist 文件夹
 * 下的 .json 清单。
 *
 * 后端 API 契约（同源同端口）：
 *   GET    /api/list                → [{"file","name","taskCount"}]
 *   GET    /api/load?file=<name>    → 文件原始 JSON 文本
 *   POST   /api/save?file=<name>    body=JSON 文本  → {"ok":true}
 *   POST   /api/new?file=<name>     用默认模板创建     → {"ok":true}；已存在 409
 *   DELETE /api/delete?file=<name>  删除文件           → {"ok":true}
 *
 * 清单数据结构（与 CHECKLIST_FORMAT.md 一致）：
 *   { name, type:"flow", maxSteps, tasks:[ { id, desc,
 *     option:{trueText,falseText}|null,
 *     trueDo:[{type,...}], falseDo:[{type,...}] } ] }
 *   动作 type 与字段：jumpto→id | print→text | run→command | end→message(可省略)
 * ============================================================ */

/* ============================================================
 * 全局状态
 * ============================================================ */
var workspace = null;        // Blockly 工作区实例
var currentFile = null;      // 当前打开的文件名（如 example.json）
var files = [];              // /api/list 返回的文件列表
var dirty = false;           // 工作区是否有未保存改动
var suppressDirty = false;   // 程序化操作时抑制 dirty 标志

// CSRF 防护 token：优先从 sessionStorage 读取（模式切换后保留），首次从 URL 读取后存入并清除 URL 中的 token
var TOKEN = sessionStorage.getItem('todolist_token') || '';
if (!TOKEN) {
    TOKEN = new URLSearchParams(location.search).get('token') || '';
    if (TOKEN) {
        sessionStorage.setItem('todolist_token', TOKEN);
        // 从 URL 中清除 token，防止泄露到历史记录/Referer
        var cleanUrl = new URL(location.href);
        cleanUrl.searchParams.delete('token');
        history.replaceState(null, '', cleanUrl);
    }
}

var statusEl = document.getElementById('status');
var fileListEl = document.getElementById('fileList');
var nameInput = document.getElementById('f-name');
var maxStepsInput = document.getElementById('f-maxsteps');
var descriptionInput = document.getElementById('f-description');
var mcVersionMinInput = document.getElementById('f-mcversionmin');

var currentLang = localStorage.getItem('lang') || (navigator.language.startsWith('zh') ? 'zh' : 'en');
function t(key) { return (I18N[currentLang] && I18N[currentLang][key]) || key; }
function applyLang() {
  // 遍历所有带 data-i18n 属性的元素，设置 textContent
  document.querySelectorAll('[data-i18n]').forEach(function (el) {
    el.textContent = t(el.getAttribute('data-i18n'));
  });
  // 遍历所有带 data-i18n-title 属性的元素，设置 title
  document.querySelectorAll('[data-i18n-title]').forEach(function (el) {

  // 遍历所有带 data-i18n-placeholder 属性的元素，设置 placeholder
  document.querySelectorAll('[data-i18n-placeholder]').forEach(function (el) {
    el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
  });
  // 更新 Blockly 工具箱分类名称
  document.querySelectorAll('[data-i18n-cat]').forEach(function (el) {
    el.setAttribute('name', t(el.getAttribute('data-i18n-cat')));
  });
  langBtn.textContent = currentLang === 'zh' ? '中' : 'EN';
  document.documentElement.lang = currentLang;
  // 主题按钮文案跟随语言
  themeBtn.textContent = themeMode === 'dark' ? '☾ ' + t('theme.dark') : themeMode === 'light' ? '☀ ' + t('theme.light') : '☀/☾ ' + t('theme.auto');
  // 刷新 Blockly 工作区（工具箱分类名 + 块 tooltip）
  if (workspace) {
    workspace.getAllBlocks().forEach(function (blk) {
      if (blk.type === 'interactive_task') blk.setTooltip(t('tooltip.interactive_task'));
      else if (blk.type === 'terminal_task') blk.setTooltip(t('tooltip.terminal_task'));
      else if (blk.type === 'jumpto') blk.setTooltip(t('tooltip.jumpto'));
      else if (blk.type === 'print') blk.setTooltip(t('tooltip.print'));
      else if (blk.type === 'run') blk.setTooltip(t('tooltip.run'));
      else if (blk.type === 'end') blk.setTooltip(t('tooltip.end'));
      else if (blk.type === 'set_var') blk.setTooltip(t('tooltip.set_var'));
      else if (blk.type === 'if') blk.setTooltip(t('tooltip.if'));
      else if (blk.type === 'game_var') blk.setTooltip(t('tooltip.game_var'));
      else if (blk.type === 'expr_text') blk.setTooltip(t('tooltip.expr_text'));
    });

  applyBlocklyMsg(currentLang);
  // 刷新已有块渲染以更新字段标签
  if (workspace) {
    workspace.refreshToolboxSelection();
    workspace.getAllBlocks().forEach(function(b) { b.render(); });
  }
}

function initWorkspace() {

function applyBlocklyTheme() {
  if (!workspace) return;
  var dark = isDarkMode();
  if (blocklyThemeDark && blocklyThemeLight) {
    workspace.setTheme(dark ? blocklyThemeDark : blocklyThemeLight);
  }
  Blockly.svgResize(workspace);
}

function isDarkMode() {
  var theme = document.documentElement.getAttribute('data-theme');
  if (theme === 'dark') return true;
  if (theme === 'light') return false;
  return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
}

/* ============================================================
 * 四、Blockly → JSON 转换（generator）
 * ============================================================ */

// 工作区序列化为清单 JSON 对象
function workspaceToJson() {
  var topBlocks = workspace.getTopBlocks(true);
  // 按 y 坐标排序
  topBlocks.sort(function (a, b) {
    return a.getRelativeToSurfaceXY().y - b.getRelativeToSurfaceXY().y;
  });
  // 过滤只保留 task 块
  var tasks = [];
  for (var i = 0; i < topBlocks.length; i++) {
    var b = topBlocks[i];
    if (b.type === 'interactive_task' || b.type === 'terminal_task') {
      tasks.push(taskBlockToJson(b));
    }
  }
  return {
    name: nameInput.value || "",
    type: "flow",
    maxSteps: parseInt(maxStepsInput.value, 10) || 0,
    description: descriptionInput.value || "",
    mcVersionMin: mcVersionMinInput.value || "",
    mcVersionMax: mcVersionMaxInput.value || "",
    tasks: tasks
  };
}

// 单个 task 块 → JSON
function taskBlockToJson(block) {
  var id = parseInt(block.getFieldValue('id'), 10) || 0;
  var desc = block.getFieldValue('desc') || "";
  var task = { id: id, desc: desc };
  if (block.type === 'terminal_task') {
    task.option = null;
    task.trueDo = [];
    task.falseDo = [];
  } else {
    // interactive_task
    task.option = {
      trueText: block.getFieldValue('trueText') || "",
      falseText: block.getFieldValue('falseText') || ""
    };
    task.trueDo = statementChainToArray('trueDo', block);
    task.falseDo = statementChainToArray('falseDo', block);
  }
  return task;
}

// 从 task 块的指定 statement input 取链，收集为 action 数组
function statementChainToArray(statementInputName, block) {
  var arr = [];
  var input = block.getInput(statementInputName);
  var childBlock = input && input.connection ? input.connection.targetBlock() : null;
  while (childBlock) {
    arr.push(actionBlockToJson(childBlock));
    childBlock = childBlock.getNextBlock();
  }
  return arr;
}

// 单个 action 块 → JSON（按 type 分支，end 的 message 为空时省略）
function actionBlockToJson(block) {
  if (block.type === 'jumpto') {
    return { type: 'jumpto', id: parseInt(block.getFieldValue('id'), 10) || 0 };
  } else if (block.type === 'print') {
    return { type: 'print', text: block.getFieldValue('text') || "" };
  } else if (block.type === 'run') {
    return { type: 'run', command: block.getFieldValue('command') || "" };
  } else if (block.type === 'end') {
    var msg = block.getFieldValue('message') || "";
    var o = { type: 'end' };
    if (msg) { o.message = msg; }
    return o;
  } else if (block.type === 'set_var') {
    return { type: 'set', var: block.getFieldValue('var') || "", value: blockToExpr(block.getInputTargetBlock('value')) };
  } else if (block.type === 'if') {
    return { type: 'if', cond: blockToExpr(block.getInputTargetBlock('cond')), id: parseInt(block.getFieldValue('id'), 10) || 0 };
  }
  return { type: block.type };
}

/* 将值输入连接的块递归转换为表达式字符串。
 * 支持 game_var / expr_text / math_number / math_arithmetic /
 *      logic_compare / logic_operation / logic_negate / logic_boolean /
 *      variables_get / text。无法识别的块返回空字符串。 */
function blockToExpr(block) {
  if (!block) return "";
  switch (block.type) {
    case 'game_var':
      return '${' + (block.getFieldValue('VAR') || '') + '}';
    case 'expr_text':
      return block.getFieldValue('TEXT') || '';
    case 'math_number':
      return String(block.getFieldValue('NUM') || '0');
    case 'math_arithmetic':
      var aOp = block.getFieldValue('OP');
      var aA = blockToExpr(block.getInputTargetBlock('A'));
      var aB = blockToExpr(block.getInputTargetBlock('B'));
      var aSym = { ADD: '+', MINUS: '-', MULTIPLY: '*', DIVIDE: '/', POWER: '^' }[aOp] || '+';
      return '(' + aA + ' ' + aSym + ' ' + aB + ')';
    case 'logic_compare':
      var cOp = block.getFieldValue('OP');
      var cA = blockToExpr(block.getInputTargetBlock('A'));
      var cB = blockToExpr(block.getInputTargetBlock('B'));
      var cSym = { EQ: '==', NEQ: '!=', LT: '<', LTE: '<=', GT: '>', GTE: '>=' }[cOp] || '==';
      return cA + ' ' + cSym + ' ' + cB;
    case 'logic_operation':
      var oOp = block.getFieldValue('OP');
      var oA = blockToExpr(block.getInputTargetBlock('A'));
      var oB = blockToExpr(block.getInputTargetBlock('B'));
      return oA + ' ' + (oOp === 'AND' ? '&&' : '||') + ' ' + oB;
    case 'logic_negate':
      var nA = blockToExpr(block.getInputTargetBlock('BOOL'));
      return '!' + nA;
    case 'logic_boolean':
      return block.getFieldValue('BOOL') === 'TRUE' ? 'true' : 'false';
    case 'variables_get':
      return '${' + (block.getFieldValue('VAR') || '') + '}';
    case 'text':
      return '"' + (block.getFieldValue('TEXT') || '') + '"';
    default:
      return '';
  }
}

/* ============================================================
 * 五、JSON → Blockly 转换（反序列化）
 * ============================================================ */
function jsonToWorkspace(jsonObj) {
  suppressDirty = true;
  try {
    workspace.clear();
    nameInput.value = jsonObj.name || "";
    maxStepsInput.value = (jsonObj.maxSteps !== undefined && jsonObj.maxSteps !== null) ? jsonObj.maxSteps : 0;
    descriptionInput.value = jsonObj.description || "";
    mcVersionMinInput.value = jsonObj.mcVersionMin || "";
    mcVersionMaxInput.value = jsonObj.mcVersionMax || "";

    var tasks = jsonObj.tasks || [];
    var yPos = 20;
    var xPos = 40;
    for (var i = 0; i < tasks.length; i++) {
      var t = tasks[i];
      var isTerminal = (t.option === null);
      var taskBlock = workspace.newBlock(isTerminal ? 'terminal_task' : 'interactive_task');
      taskBlock.setFieldValue(String(t.id != null ? t.id : 1), 'id');
      taskBlock.setFieldValue(t.desc || "", 'desc');
      if (!isTerminal) {
        taskBlock.setFieldValue((t.option && t.option.trueText) || "是", 'trueText');
        taskBlock.setFieldValue((t.option && t.option.falseText) || "否", 'falseText');
        // 构造 trueDo / falseDo 动作链
        actionsToStatement(taskBlock, 'trueDo', t.trueDo || []);
        actionsToStatement(taskBlock, 'falseDo', t.falseDo || []);
      }
      taskBlock.initSvg();
      taskBlock.render();
      taskBlock.moveBy(xPos, yPos);
      yPos += taskBlock.getHeightWidth().height + 30;
    }
    workspace.render();
    if (workspaceHint) workspaceHint.classList.add('hidden');
  } finally {
    suppressDirty = false;
    dirty = false;
  }
}

// 把 action 数组串接成 statement 链并连到 task 块
function actionsToStatement(taskBlock, inputName, actions) {
  if (!actions || !actions.length) return;
  var prev = null;
  for (var i = 0; i < actions.length; i++) {
    var actionBlock = createActionBlock(actions[i]);
    if (i === 0) {
      // 第一个块连接到 task 块的 statement input
      taskBlock.getInput(inputName).connection.connect(actionBlock.previousConnection);
    } else {
      prev.nextConnection.connect(actionBlock.previousConnection);
    }
    prev = actionBlock;
  }
}

// 根据动作 JSON 创建对应 action 块并填字段
function createActionBlock(action) {
  var type = action.type || 'jumpto';
  var b = workspace.newBlock(type);
  if (type === 'jumpto') {
    b.setFieldValue(String(action.id != null ? action.id : 1), 'id');
  } else if (type === 'print') {
    b.setFieldValue(action.text || "", 'text');
  } else if (type === 'run') {
    b.setFieldValue(action.command || "/", 'command');
  } else if (type === 'end') {
    b.setFieldValue(action.message || "", 'message');
  } else if (type === 'set') {
    b.setFieldValue(action.var || "", 'var');
    // 为 value 输入创建 expr_text 子块承载已有表达式字符串
    var valBlock = workspace.newBlock('expr_text');
    valBlock.setFieldValue(action.value || "", 'TEXT');
    valBlock.initSvg();
    valBlock.render();
    b.getInput('value').connection.connect(valBlock.outputConnection);
  } else if (type === 'if') {
    // 为 cond 输入创建 expr_text 子块承载已有条件字符串
    var condBlock = workspace.newBlock('expr_text');
    condBlock.setFieldValue(action.cond || "", 'TEXT');
    condBlock.initSvg();
    condBlock.render();
    b.getInput('cond').connection.connect(condBlock.outputConnection);
    b.setFieldValue(String(action.id != null ? action.id : 1), 'id');
  }
  b.initSvg();
  b.render();
  return b;
}

/* ============================================================
 * 六、保存前校验
 * ============================================================ */
function validateWorkspace() {
  var name = nameInput.value || "";
  if (!name.trim()) {
    return { ok: false, error: t('msg.name_empty') };
  }
  var topBlocks = workspace.getTopBlocks(true);
  // 收集所有 task 块 id（用于唯一性校验与 jumpto 目标存在性校验）
  var taskIdSet = {};
  var taskIds = [];
  for (var i = 0; i < topBlocks.length; i++) {
    var b = topBlocks[i];
    if (b.type === 'interactive_task' || b.type === 'terminal_task') {
      var id = parseInt(b.getFieldValue('id'), 10);
      if (taskIdSet.hasOwnProperty(id)) {
        return { ok: false, error: t('msg.task_id_dup_prefix') + id + t('msg.task_id_dup_suffix') };
      }
      taskIdSet[id] = true;
      taskIds.push(id);
    }
  }
  // 遍历所有 jumpto 块，校验目标 id 存在
  var allBlocks = workspace.getAllBlocks();
  for (var j = 0; j < allBlocks.length; j++) {
    var blk = allBlocks[j];
    if (blk.type === 'jumpto') {
      var targetId = parseInt(blk.getFieldValue('id'), 10);
      if (!taskIdSet.hasOwnProperty(targetId)) {
        return { ok: false, error: t('msg.jumpto_missing_prefix') + targetId + t('msg.jumpto_missing_suffix') };
      }
    }
    if (blk.type === 'if') {
      var ifTargetId = parseInt(blk.getFieldValue('id'), 10);
      if (!taskIdSet.hasOwnProperty(ifTargetId)) {
        return { ok: false, error: t('msg.if_target_not_found') + ': ' + ifTargetId };
      }
    }
  }
  return { ok: true };
}

/* ============================================================
 * 七、文件列表 / 加载 / 保存 / 新建 / 删除
 * ============================================================ */
async function refreshList() {
  try {
    var res = await fetch('/api/list?token=' + encodeURIComponent(TOKEN));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    files = await res.json();
  } catch (e) {
    files = [];
    showStatus(t('msg.list_failed') + e.message, true);
  }
  renderFileList();
  return files;
}

function renderFileList() {
  if (!files.length) {
    fileListEl.innerHTML = '<div class="empty-hint">' + escapeHtml(t('hint.no_files')) + '</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < files.length; i++) {
    var f = files[i];
    var active = (f.file === currentFile) ? ' active' : '';
    html += '<div class="file-item' + active + '" data-file="' + escapeAttr(f.file) + '">' +
      '<span class="file-name">' + escapeHtml(f.file) + '</span>' +
      '<span class="file-meta">' + escapeHtml(f.name || '') + ' · ' + (f.taskCount != null ? f.taskCount : '?') + ' ' + escapeHtml(t('file.steps')) + '</span>' +
      '</div>';
  }
  fileListEl.innerHTML = html;
}

fileListEl.addEventListener('click', function (e) {
  var item = e.target.closest('.file-item');
  if (!item) return;
  loadFile(item.dataset.file);
});

async function loadFile(filename) {
  if (!filename) return;
  // 有未保存改动时提示
  if (dirty && !confirm(t('msg.discard_load_prefix') + filename + t('msg.discard_load_suffix'))) return;
  try {
    var res = await fetch('/api/load?file=' + encodeURIComponent(filename) + '&token=' + encodeURIComponent(TOKEN));
    if (!res.ok) {
      var respText = await res.text();
      throw new Error(respText || ('HTTP ' + res.status));
    }
    var text = await res.text();
    var data = JSON.parse(text);
    jsonToWorkspace(data);
    currentFile = filename;
    dirty = false;
    renderFileList();
    if (workspaceHint) workspaceHint.classList.add('hidden');
    showStatus(t('msg.loaded') + filename);
  } catch (e) {
    showStatus(t('msg.load_failed') + e.message, true);
  }
}

async function save() {
  // 1. 校验
  var v = validateWorkspace();
  if (!v.ok) {
    alert(v.error);
    return;
  }
  if (!currentFile) {
    showStatus(t('msg.no_file_save'), true);
    return;
  }
  // 2. 生成对象 → 字符串
  var jsonObj = workspaceToJson();
  var json = JSON.stringify(jsonObj, null, 2);
  // 3. POST 保存
  try {
    var res = await fetch('/api/save?file=' + encodeURIComponent(currentFile) + '&token=' + encodeURIComponent(TOKEN), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: json
    });
    if (!res.ok) {
      var respText = await res.text();
      throw new Error(respText || ('HTTP ' + res.status));
    }
    dirty = false;
    showStatus(t('msg.saved') + currentFile);
    await refreshList();
  } catch (e) {
    showStatus(t('msg.save_failed') + e.message, true);
  }
}

async function newFile() {
  var name = prompt(t('msg.input_filename'));
  if (!name) return;
  if (!/\.json$/i.test(name)) name += '.json';
  if (/[\\\/]/.test(name)) { showStatus(t('msg.invalid_filename'), true); return; }
  try {
    var res = await fetch('/api/new?file=' + encodeURIComponent(name) + '&token=' + encodeURIComponent(TOKEN), { method: 'POST' });
    if (res.status === 409) { showStatus(t('msg.file_exists') + name, true); return; }
    if (!res.ok) {
      var respText = await res.text();
      throw new Error(respText || ('HTTP ' + res.status));
    }
    await refreshList();
    await loadFile(name);
    showStatus(t('msg.created') + name);
  } catch (e) {
    showStatus(t('msg.create_failed') + e.message, true);
  }
}

async function deleteFile() {
  if (!currentFile) { showStatus(t('msg.no_file'), true); return; }
  if (!confirm(t('msg.delete_confirm_prefix') + currentFile + t('msg.delete_confirm_suffix'))) return;
  try {
    var res = await fetch('/api/delete?file=' + encodeURIComponent(currentFile) + '&token=' + encodeURIComponent(TOKEN), { method: 'DELETE' });
    if (!res.ok) {
      var respText = await res.text();
      throw new Error(respText || ('HTTP ' + res.status));
    }
    showStatus(t('msg.deleted') + currentFile);
    currentFile = null;
    dirty = false;
    suppressDirty = true;
    try { workspace.clear(); } finally { suppressDirty = false; }
    nameInput.value = "";
    maxStepsInput.value = "";
    descriptionInput.value = "";
    mcVersionMinInput.value = "";
    mcVersionMaxInput.value = "";
    if (workspaceHint) workspaceHint.classList.remove('hidden');
    await refreshList();
  } catch (e) {
    showStatus(t('msg.delete_failed') + e.message, true);
  }
}

/* ============================================================
 * 八、模式切换（表单 / 块）
 * ============================================================ */
document.getElementById('modeFormBtn').addEventListener('click', function () {
  if (dirty && !confirm(t('msg.discard_changes'))) return;
  var target = '/';
  if (currentFile) {
    target = '/?mode=form&file=' + encodeURIComponent(currentFile);
  } else {
    target = '/?mode=form';
  }
  location.href = target;  // token 已在 sessionStorage，不再拼入 URL
});

/* ============================================================
 * 九、输入框变化也标记 dirty
 * ============================================================ */
nameInput.addEventListener('input', function () { dirty = true; });
maxStepsInput.addEventListener('input', function () { dirty = true; });
descriptionInput.addEventListener('input', function () { dirty = true; });
mcVersionMinInput.addEventListener('input', function () { dirty = true; });
mcVersionMaxInput.addEventListener('input', function () { dirty = true; });

/* ============================================================
 * 十、状态提示
 * ============================================================ */
var statusTimer = null;
function showStatus(msg, isErr) {
  statusEl.textContent = msg;
  statusEl.classList.toggle('err', !!isErr);
  if (statusTimer) clearTimeout(statusTimer);
  statusTimer = setTimeout(function () { statusEl.textContent = ''; }, 4000);
}

/* ============================================================
 * 十一、浅/深色主题（与 editor.html 一致）
 * ============================================================ */
var themeMode = localStorage.getItem('theme') || 'auto'; // auto | light | dark
function applyTheme() {
  if (themeMode === 'light' || themeMode === 'dark') {
    document.documentElement.setAttribute('data-theme', themeMode);
  } else {
    document.documentElement.removeAttribute('data-theme');
  }
  themeBtn.textContent = themeMode === 'dark' ? '☾ ' + t('theme.dark') : themeMode === 'light' ? '☀ ' + t('theme.light') : '☀/☾ ' + t('theme.auto');
  applyBlocklyTheme();
}
themeBtn.addEventListener('click', function () {
  themeMode = themeMode === 'auto' ? 'dark' : themeMode === 'dark' ? 'light' : 'auto';
  localStorage.setItem('theme', themeMode);
  applyTheme();
});

/* ============================================================
 * 十二、HTML 转义
 * ============================================================ */
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function escapeAttr(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

/* ============================================================
 * 十三、窗口尺寸变化时同步 Blockly
 * ============================================================ */
window.addEventListener('resize', function () {
  if (workspace) Blockly.svgResize(workspace);
});

/* ============================================================
 * 十四、按钮绑定
 * ============================================================ */
document.getElementById('saveBtn').addEventListener('click', save);
document.getElementById('newBtn').addEventListener('click', newFile);
document.getElementById('deleteBtn').addEventListener('click', deleteFile);

/* 复制：复制当前选中的块到剪贴板 */
document.getElementById('copyBtn').addEventListener('click', function () {
  if (!workspace) return;
  var selected = Blockly.selected;
  if (selected) {
    Blockly.clipboard.copy(selected);
    showStatus(t('msg.copied'));
  } else {
    showStatus(t('msg.no_block_selected'), true);
  }
});

/* 粘贴：从剪贴板粘贴块到工作区 */
document.getElementById('pasteBtn').addEventListener('click', function () {
  if (!workspace) return;
  if (Blockly.clipboard.paste) {
    Blockly.clipboard.paste(workspace);
  } else if (Blockly.Xml && Blockly.Xml.domToBlock) {
    // 兼容旧版 API
    if (Blockly.clipboard) {
      var xml = Blockly.Xml.textToDom(Blockly.clipboard);
      Blockly.Xml.domToBlock(xml, workspace);
    }
  }
});

/* 撤销 */
document.getElementById('undoBtn').addEventListener('click', function () {
  if (!workspace) return;
  workspace.undo(false);
});

/* 重做 */
document.getElementById('redoBtn').addEventListener('click', function () {
  if (!workspace) return;
  workspace.undo(true);
});

/* ============================================================
 * 十五、初始化
 * ============================================================ */
(async function init() {
  applyTheme();
  applyLang();
  initWorkspace();
  await refreshList();
  var params = new URLSearchParams(location.search);
  var file = params.get('file');
  if (file) {
    await loadFile(file);
  } else if (files.length) {
    await loadFile(files[0].file);
  } else {
    showStatus(t('hint.empty_dir'));
  }
})();
</script>
</body>
